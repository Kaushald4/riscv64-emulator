<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GlassHart VM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: system-ui, monospace;
      display: flex; flex-direction: column; height: 100vh;
      overflow: hidden;
    }
    #toolbar {
      display: flex; gap: 8px; padding: 8px 12px;
      background: #16213e; border-bottom: 1px solid #0f3460;
    }
    #boot {
      background: #0f3460; color: #e0e0e0; border: none;
      padding: 6px 14px; border-radius: 4px; cursor: pointer;
      font-size: 13px; transition: background 0.15s;
    }
    #boot:hover { background: #1a4a8a; }
    #boot:disabled { opacity: 0.4; cursor: default; }
    #status {
      flex: 1; text-align: right; color: #888;
      font-size: 12px; padding: 4px 0; align-self: center;
    }
    #terminal {
      flex: 1; padding: 4px; background: #0d1117;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="boot">Boot</button>
    <div id="status">Fetching images...</div>
  </div>
  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
